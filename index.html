<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGLR GNRTR</title>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body>
    <div id="midi-container" class="bg-white text-black">
        <div id="midi-status" class="midi-disconnected">MIDI: Disconnected</div>
        <div class="midi-section">
            <h4>
                MIDI Controls
                <button class="midi-section-toggle" data-section="midi-controls">▼</button>
            </h4>
            <div class="midi-section-content" data-section="midi-controls">
                <button id="midi-connect" class="midi-button">Connect MIDI</button>
                <button id="midi-disconnect" class="midi-button">Disconnect</button>
                <button id="midi-refresh" class="midi-button">Refresh Devices</button>
                <button id="midi-help" class="midi-button">Help</button>
            </div>
        </div>
        <div class="midi-section">
            <h4>
                Channel/CC Mapping
                <button class="midi-section-toggle" data-section="channel-mapping">▼</button>
            </h4>
            <div class="midi-section-content" data-section="channel-mapping">
                <div class="midi-control buttons">
                    <button id="test-cc-button" class="midi-button">Test CC Values</button>
                    <button id="reset-cc-button" class="midi-button">Reset to Default</button>
                    <button id="save-preset-button" class="midi-button">Save Preset</button>
                    <button id="load-preset-button" class="midi-button">Load Preset</button>
                </div>
            <div class="midi-control buttons">
                <label>Preset:</label>
                <select id="cc-preset-select" class="midi-select">
                    <option value="">Custom</option>
                    <option value="standard">Standard (Ch:1, CC:1-11)</option>
                    <option value="multichannel">Multi-Channel (Ch:1-11, CC:1)</option>
                    <option value="modwheel">Mod Wheel Style (Ch:1, CC:1,2,4,7,11,16,21-25)</option>
                    <option value="knobs">Knob Controller (Ch:1, CC:16-26)</option>
                    <option value="faders">Fader Controller (Ch:1, CC:28-38)</option>
                </select>
            </div>
            <div class="midi-control">
                <label>Animation Speed:</label>
                <div class="inputs">
                    <input type="number" id="midi-speed-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-speed-cc" value="1" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-speed-cc-slider" min="0" max="127" value="1" class="midi-slider">
                    <span id="midi-speed-cc-value" class="midi-value">1</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Movement Amp:</label>
                <div class="inputs">
                    <input type="number" id="midi-movement-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-movement-cc" value="2" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-movement-cc-slider" min="0" max="127" value="2" class="midi-slider">
                    <span id="midi-movement-cc-value" class="midi-value">2</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Rotation Amp:</label>
                <div class="inputs">
                    <input type="number" id="midi-rotation-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-rotation-cc" value="3" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-rotation-cc-slider" min="0" max="127" value="3" class="midi-slider">
                    <span id="midi-rotation-cc-value" class="midi-value">3</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Scale Amp:</label>
                <div class="inputs">
                    <input type="number" id="midi-scale-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-scale-cc" value="4" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-scale-cc-slider" min="0" max="127" value="4" class="midi-slider">
                    <span id="midi-scale-cc-value" class="midi-value">4</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Randomness:</label>
                <div class="inputs">
                    <input type="number" id="midi-randomness-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-randomness-cc" value="5" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-randomness-cc-slider" min="0" max="127" value="5" class="midi-slider">
                    <span id="midi-randomness-cc-value" class="midi-value">5</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Cell Size:</label>
                <div class="inputs">
                    <input type="number" id="midi-cellsize-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-cellsize-cc" value="6" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-cellsize-cc-slider" min="0" max="127" value="6" class="midi-slider">
                    <span id="midi-cellsize-cc-value" class="midi-value">6</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Movement Freq:</label>
                <div class="inputs">
                    <input type="number" id="midi-movementfrequency-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-movementfrequency-cc" value="7" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-movementfrequency-cc-slider" min="0" max="127" value="7" class="midi-slider">
                    <span id="midi-movementfrequency-cc-value" class="midi-value">7</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Rotation Freq:</label>
                <div class="inputs">
                    <input type="number" id="midi-rotationfrequency-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-rotationfrequency-cc" value="8" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-rotationfrequency-cc-slider" min="0" max="127" value="8" class="midi-slider">
                    <span id="midi-rotationfrequency-cc-value" class="midi-value">8</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Scale Freq:</label>
                <div class="inputs">
                    <input type="number" id="midi-scalefrequency-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-scalefrequency-cc" value="9" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-scalefrequency-cc-slider" min="0" max="127" value="9" class="midi-slider">
                    <span id="midi-scalefrequency-cc-value" class="midi-value">9</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Grid Width:</label>
                <div class="inputs">
                    <input type="number" id="midi-gridwidth-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-gridwidth-cc" value="10" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-gridwidth-cc-slider" min="0" max="127" value="10" class="midi-slider">
                    <span id="midi-gridwidth-cc-value" class="midi-value">10</span>
                </div>
            </div>
            <div class="midi-control">
                <label>Grid Height:</label>
                <div class="inputs">
                    <input type="number" id="midi-gridheight-channel" value="1" min="1" max="16" class="midi-channel-input">
                    <input type="number" id="midi-gridheight-cc" value="11" min="0" max="127" class="midi-cc-input">
                    <input type="range" id="midi-gridheight-cc-slider" min="0" max="127" value="11" class="midi-slider">
                    <span id="midi-gridheight-cc-value" class="midi-value">11</span>
                </div>
            </div>
            </div>
        </div>
        <div class="midi-section">
            <h4>
                Note Controls
                <button class="midi-section-toggle" data-section="note-controls">▼</button>
            </h4>
            <div class="midi-section-content" data-section="note-controls">
                <div class="midi-control">
                    <label>Shape Cycling:</label>
                    <div class="inputs">
                        <input type="number" id="midi-shape-note" value="60" min="0" max="127">
                    </div>
                </div>
                <div class="midi-control">
                    <label>Size Animation:</label>
                    <div class="inputs">
                        <input type="number" id="midi-size-note" value="61" min="0" max="127">
                    </div>
                </div>
                <div class="midi-control">
                    <label>Show Grid:</label>
                    <div class="inputs">
                        <input type="number" id="midi-grid-note" value="62" min="0" max="127">
                    </div>
                </div>
            </div>
        </div>
        <div class="midi-section">
            <h4>
                MIDI Activity
                <button class="midi-section-toggle" data-section="midi-activity">▼</button>
            </h4>
            <div class="midi-section-content" data-section="midi-activity">
                <div id="midi-activity" class="midi-activity-indicator">
                    <div class="activity-bar"></div>
                    <div class="activity-bar"></div>
                    <div class="activity-bar"></div>
                    <div class="activity-bar"></div>
                    <div class="activity-bar"></div>
                </div>
                <div id="midi-last-message" class="midi-last-message">No MIDI activity</div>
            </div>
        </div>
    </div>
    <div id="gui-container"></div>
    
    <!-- Hidden file input for loading presets -->
    <input type="file" id="preset-file-input" accept=".json" style="display: none;">
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
